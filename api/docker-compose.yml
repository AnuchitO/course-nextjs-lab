services:

  postgres-qoomlee:
    image: postgres:16-alpine
    environment:
      TZ:                Asia/Bangkok
      POSTGRES_DB:       ${POSTGRES_QOOMLEE_DB:-qoomlee}
      POSTGRES_USER:     ${POSTGRES_USER:-qoomlee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qoomlee}
    ports:
      - "5433:5432"
    volumes:
      - postgres_qoomlee_data:/var/lib/postgresql/data
      - ./infra/db/qoomlee:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qoomlee}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-qoomlee-payment:
    image: postgres:16-alpine
    environment:
      TZ:                Asia/Bangkok
      POSTGRES_DB:       ${POSTGRES_PAYMENT_DB:-qoomlee_payment}
      POSTGRES_USER:     ${POSTGRES_PAYMENT_USER:-qoomlee_payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qoomlee}
    ports:
      - "5434:5432"
    volumes:
      - postgres_qoomlee_payment_data:/var/lib/postgresql/data
      - ./infra/db/qoomlee-payment:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_PAYMENT_USER:-qoomlee_payment} -d ${POSTGRES_PAYMENT_DB:-qoomlee_payment}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qoomlee-service:
    build: ./services/qoomlee
    environment:
      PORT:            8082
      DATABASE_URL:    postgres://${POSTGRES_USER:-qoomlee}:${POSTGRES_PASSWORD:-qoomlee}@postgres-qoomlee:5432/${POSTGRES_QOOMLEE_DB:-qoomlee}?sslmode=disable
      INTERNAL_TOKEN:  ${INTERNAL_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8082:8082"
    depends_on:
      postgres-qoomlee:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  payment-service:
    build: ./services/payment
    environment:
      PORT:                8084
      DATABASE_URL:        postgres://${POSTGRES_PAYMENT_USER:-qoomlee_payment}:${POSTGRES_PASSWORD:-qoomlee}@postgres-qoomlee-payment:5432/${POSTGRES_PAYMENT_DB:-qoomlee_payment}?sslmode=disable
      QOOMLEE_SERVICE_URL: http://qoomlee-service:8082
      OMISE_PUBLIC_KEY:    ${OMISE_PUBLIC_KEY}
      OMISE_SECRET_KEY:    ${OMISE_SECRET_KEY}
      INTERNAL_TOKEN:      ${INTERNAL_TOKEN}   # sent to qoomlee-service on PUT /status
    ports:
      - "8084:8084"
    depends_on:
      postgres-qoomlee-payment:
        condition: service_healthy
      qoomlee-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_qoomlee_data:
  postgres_qoomlee_payment_data:
